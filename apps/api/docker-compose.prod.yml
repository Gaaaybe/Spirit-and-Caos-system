
services:
  postgres:
    container_name: aetherium-postgres
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-aetherium}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432" # Expõe apenas internamente para a rede do docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-aetherium}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aetherium-api
    restart: always
    ports:
      - "3333:3333" # Porta que você conectará o Nginx/Proxy
    environment:
      NODE_ENV: production
      PORT: 3333
      DATABASE_URL: ${DATABASE_URL}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      postgres:
        condition: service_healthy
    # Comando sobrescrito para rodar as migrations e seed em produção antes de iniciar a API
    command: >
      sh -c "pnpm prisma migrate deploy && pnpm prisma db seed && pnpm run start:prod"

volumes:
  postgres_data:
    name: aetherium_pg_data
